<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#141a2a">
  <meta name="api-base" content="">
  <title>Worker Cash App</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/worker-icon-192.svg" type="image/svg+xml">
  <link rel="stylesheet" href="app/pages/worker/worker.page.css">
</head>
<body>
  <main class="container">
    <section class="card" id="auth-card">
      <h1>WORKER APP</h1>
      <p class="sub">Kirish qiling va pul berdi/oldi yozing</p>
      <label>Username</label>
      <input id="username" type="text" placeholder="worker01">
      <label>Parol</label>
      <input id="password" type="password" placeholder="******">
      <button id="login-btn">Kirish</button>
      <div id="auth-msg" class="msg"></div>
    </section>

    <section class="card" id="action-card" style="display:none">
      <div class="top-row">
        <h2>Pul Harakati</h2>
        <button id="logout-btn" class="ghost">Chiqish</button>
      </div>

      <div id="conn-status" class="status-pill">Status: ulanish tekshirilmoqda...</div>

      <h3 style="margin-top:14px">1) Yangi bildirishnomalar</h3>
      <div id="notify-list" class="list"></div>

      <div class="selected-box" id="selected-notify-box" style="display:none">
        <div class="selected-title">Tanlangan bildirishnoma</div>
        <div id="selected-notify-text" class="selected-text"></div>
      </div>

      <h3 style="margin-top:14px">2) Pul harakatini kiriting</h3>

      <label>Action turi</label>
      <select id="action-type">
        <option value="give">Pul berdi</option>
        <option value="take">Pul oldi</option>
      </select>

      <label>Miqdor</label>
      <input id="amount" type="number" placeholder="0">

      <label>Valyuta</label>
      <select id="currency">
        <option value="won">WON</option>
        <option value="usd">USD</option>
      </select>

      <label>Izoh</label>
      <input id="note" type="text" placeholder="ixtiyoriy">

      <div class="quick-row">
        <button id="set-give-btn" type="button">Set GIVE</button>
        <button id="set-take-btn" type="button">Set TAKE</button>
        <button id="set-half-btn" type="button">Half</button>
      </div>

      <button id="save-btn">Saqlash</button>
      <div id="save-msg" class="msg"></div>

      <h3>Oxirgi yozuvlar</h3>
      <div id="list" class="list"></div>
    </section>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.7/signalr.min.js"></script>
  <script src="app/core/frontend-infra.js"></script>
  <script src="app/pages/worker/worker.page.js"></script>
</body>
</html>
