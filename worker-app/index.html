<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#141a2a">
  <meta name="api-base" content="">
  <title>Worker Cash App</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/worker-icon-192.svg" type="image/svg+xml">
  <link rel="stylesheet" href="app/pages/worker/worker.page.css">
</head>
<body>
  <main class="container">
    <section class="card" id="auth-card">
      <h1>WORKER APP</h1>
      <p class="sub">Kirish qiling va ishlar ro'yxatini ko'ring</p>
      <label>Username</label>
      <input id="username" type="text" placeholder="worker01">
      <label>Parol</label>
      <input id="password" type="password" placeholder="******">
      <button id="login-btn">Kirish</button>
      <div id="auth-msg" class="msg"></div>
    </section>

    <section class="card" id="action-card" style="display:none">
      <div class="top-row">
        <h2>ISHLAR</h2>
        <button id="logout-btn" class="ghost">Chiqish</button>
      </div>

      <div id="conn-status" class="status-pill">Status: ulanish tekshirilmoqda...</div>

      <h3 style="margin-top:14px">Ishlar ro'yxati</h3>
      <div id="notify-list" class="list"></div>
      <div id="save-msg" class="msg"></div>
    </section>
  </main>

  <div class="modal-overlay" id="work-modal" style="display:none">
    <div class="modal-card">
      <div class="modal-head">
        <h3 style="margin:0">Ish bo'yicha kiritish</h3>
        <button id="close-work-modal-btn" class="ghost" type="button">Yopish</button>
      </div>

      <div id="modal-work-title" class="work-item-title" style="margin-top:8px"></div>
      <div id="modal-work-message" class="meta" style="margin-top:4px"></div>
      <div id="modal-work-progress" class="work-summary" style="margin-top:10px"></div>

      <div class="work-panel" style="margin-top:12px;padding-top:0;border-top:none">
        <label>Valyuta</label>
        <input id="work-currency" type="text" readonly>

        <label>Miqdor</label>
        <input id="work-amount" type="number" step="0.01" placeholder="0">

        <div class="quick-row quick-row-two" style="margin-top:12px">
          <button id="submit-work-btn" type="button">Qo'shish</button>
          <button id="complete-work-btn" type="button">To'liq yopish</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.7/signalr.min.js"></script>
  <script src="app/core/frontend-infra.js"></script>
  <script src="app/pages/worker/worker.page.js"></script>
</body>
</html>
